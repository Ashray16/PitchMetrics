[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && rm -rf backend/skillcorner_data && git clone https://github.com/SkillCorner/opendata.git backend/skillcorner_data"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"

[env]
PORT = "8080"
PYTHON_VERSION = "3.11"
ALLOWED_ORIGINS = "*"
